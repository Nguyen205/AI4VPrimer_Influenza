<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI4VPrimer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 2rem; }
h1 { margin-bottom: 1.5rem; color: #333; }
h2 { margin: 1.5rem 0 0.75rem; color: #555; border-bottom: 2px solid #ddd; padding-bottom: 0.3rem; }
.container { max-width: 800px; margin: 0 auto; }
.field { display: flex; align-items: center; margin: 0.5rem 0; gap: 1rem; }
.field label { min-width: 220px; font-weight: 500; font-size: 0.9rem; color: #444; }
.field input, .field textarea { flex: 1; padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
.field textarea { height: 60px; font-family: monospace; }
.field input:focus, .field textarea:focus { outline: none; border-color: #4a90d9; }
button { margin-top: 1.5rem; padding: 0.7rem 2rem; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
button:hover { background: #357abd; }
.msg { margin-top: 1rem; padding: 0.7rem; border-radius: 4px; display: none; }
.msg.ok { display: block; background: #d4edda; color: #155724; }
.msg.err { display: block; background: #f8d7da; color: #721c24; }
.hint { font-size: 0.75rem; color: #888; margin-left: 220px; margin-top: -0.3rem; margin-bottom: 0.3rem; }
</style>
</head>
<body>
<div class="container">
<h1>🧬 AI4VPrimer</h1>
<p style="margin-bottom:1rem;color:#666;">Edit parameters below and click Save. The pipeline code updates automatically.</p>

<div id="form"></div>
<button onclick="save()">💾 Save Parameters</button>
<button onclick="run()" style="background:#28a745;">▶️ Run Pipeline</button>
<div id="msg" class="msg"></div>
<pre id="output" style="display:none;margin-top:1rem;background:#1e1e1e;color:#d4d4d4;padding:1rem;border-radius:4px;overflow-x:auto;font-size:0.8rem;max-height:400px;overflow-y:auto;"></pre>
</div>

<script>
const DESCRIPTIONS = {
  GENE_NAME: '* Gene/target name',
  ALN_FILE: '* Path to aligned FASTA file',
  CROSS_PANELS: 'Cross-panel FASTA files (optional, JSON: {"name": "path", ...} or leave empty)',
  SPECIFICITY_FILE: 'Non-target FASTA for specificity (optional, path or leave empty)',
  OUT_FILE: '* Output report file path',
  PRIMERS_PER_REGION: '* Max primers kept per conserved region',
  IDENTITY_THRESHOLD: 'Min conservation for region selection (0-1)',
  MIN_REGION_LEN: 'Min conserved region length (bp)',
  MAX_PRIMER_LEN: 'Max primer length (bp)',
  MAX_AMB: 'Max ambiguous bases per primer',
  IMPROVE_THRESH: 'Sensitivity improvement threshold',
  MIN_TM: 'Min melting temperature (°C)',
  MAX_LOW_IDENTITY_BRIDGE: 'Max low-identity positions to bridge',
  MIN_AMP_SEQ: 'Min amplicon for sequencing (bp)',
  MAX_AMP_SEQ: 'Max amplicon for sequencing (bp)',
  MIN_AMP_QPCR: 'Min amplicon for qPCR (bp)',
  MAX_AMP_QPCR: 'Max amplicon for qPCR (bp)',
  MIN_PRIMER_SENS: 'Min individual primer sensitivity (%)',
  SENS_TARGET: 'Target true PCR sensitivity (%)',
  OVERLAP_LIMITS: 'Progressive overlap relaxation (JSON array)',
  COMBO_DEGEN_PREFER: 'Preferred max combo degeneracy',
  COMBO_DEGEN_MAX: 'Hard max combo degeneracy'
};

let currentData = {};

async function load() {
  const res = await fetch('/api/params');
  const data = await res.json();
  currentData = {...data.config, ...data.parameters};
  render(data);
}

function render(data) {
  let html = '<h2>Configuration</h2>';
  for (const [k, v] of Object.entries(data.config)) html += field(k, v);
  html += '<h2>Design & Selection Parameters</h2>';
  for (const [k, v] of Object.entries(data.parameters)) html += field(k, v);
  document.getElementById('form').innerHTML = html;
}

function field(key, value) {
  const isComplex = typeof value === 'object' && value !== null;
  const display = isComplex ? JSON.stringify(value) : (value === null ? '' : value);
  const desc = DESCRIPTIONS[key] || key;
  const inputType = isComplex ? 'textarea' : 'input';
  const tag = isComplex
    ? `<textarea id="${key}" data-complex="1">${display}</textarea>`
    : `<input id="${key}" value="${display}" placeholder="${value === null ? 'null (leave empty for None)' : ''}">`;
  return `<div class="field"><label>${key}</label>${tag}</div><div class="hint">${desc}</div>`;
}

async function save() {
  const payload = {};
  for (const key of Object.keys(currentData)) {
    const el = document.getElementById(key);
    if (!el) continue;
    let val = el.value.trim();
    // Determine type from original
    const orig = currentData[key];
    if (val === '' || val === 'null') {
      payload[key] = null;
    } else if (el.dataset.complex) {
      payload[key] = JSON.parse(val);
    } else if (typeof orig === 'number') {
      payload[key] = val.includes('.') ? parseFloat(val) : parseInt(val);
    } else {
      payload[key] = val;
    }
  }
  const res = await fetch('/api/params', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
  });
  const result = await res.json();
  const msg = document.getElementById('msg');
  if (result.status === 'ok') {
    msg.className = 'msg ok'; msg.textContent = '✓ Parameters saved to primer_pipeline.py';
  } else {
    msg.className = 'msg err'; msg.textContent = 'Errors: ' + result.errors.join(', ');
  }
  setTimeout(() => msg.className = 'msg', 3000);
}

async function run() {
  const msg = document.getElementById('msg');
  const output = document.getElementById('output');
  msg.className = 'msg ok'; msg.textContent = '⏳ Running pipeline...';
  output.style.display = 'none';
  const res = await fetch('/api/run', {method: 'POST'});
  const result = await res.json();
  if (result.returncode === 0) {
    msg.className = 'msg ok'; msg.textContent = '✓ Pipeline completed successfully';
  } else {
    msg.className = 'msg err'; msg.textContent = '✗ Pipeline failed (see output below)';
  }
  output.style.display = 'block';
  output.textContent = result.stdout + (result.stderr ? '\n--- ERRORS ---\n' + result.stderr : '');
}

load();
</script>
</body>
</html>
